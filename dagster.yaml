# Dagster instance configuration (Phase 1F)
# Set DAGSTER_HOME to this directory so Dagster finds this file.
# Run: dagster dev -m ecommerce_analytics
# Docs: https://docs.dagster.io/guides/deploy/dagster-yaml

run_storage:
  module: dagster.core.storage.runs
  class: SqliteRunStorage
  config:
    base_dir: .dagster/history

schedule_storage:
  module: dagster.core.storage.schedules
  class: SqliteScheduleStorage
  config:
    base_dir: .dagster/schedules

event_log_storage:
  module: dagster.core.storage.event_log
  class: SqliteEventLogStorage
  config:
    base_dir: .dagster/history

compute_logs:
  module: dagster.core.storage.local_compute_log_manager
  class: LocalComputeLogManager
  config:
    base_dir: .dagster/compute_logs

local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: .dagster/storage

code_servers:
  local_startup_timeout: 120
  reload_timeout: 120

# Optional: enable sensors (e.g. Kafka lag)
# run_launcher:
#   module: dagster.core.launcher
#   class: DefaultRunLauncher
